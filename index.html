<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision Check Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #121212; color: white; margin: 0; }
        #app-container { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #video-container { position: relative; width: 320px; height: 240px; border-radius: 15px; overflow: hidden; border: 2px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        video { transform: scaleX(-1); width: 100%; height: 100%; object-fit: cover; }
        #status { margin-top: 15px; font-weight: bold; font-size: 18px; min-height: 24px; }
        
        #chart-container { margin-top: 20px; background: white; color: black; padding: 20px; border-radius: 10px; min-width: 280px; display: none; }
        .snellen-letter { font-family: serif; font-weight: bold; line-height: 1; display: block; margin-bottom: 10px; }
        
        button { background: #0078d4; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 10px; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        .scan-btn { background: #28a745; display: none; }
    </style>
</head>
<body>
    <div id="app-container">
        <h1>Vision Screening AI</h1>
        <div id="video-container">
            <video id="webcam" autoplay playsinline></video>
        </div>
        <div id="status">Initializing AI...</div>

        <div id="chart-container">
            <div id="snellen-letter" class="snellen-letter">E</div>
            <p id="result-text" style="color: #666; font-size: 14px;">Can you see this letter clearly?</p>
            <div id="test-controls">
                <button onclick="nextLevel()">Yes, Next</button>
                <button onclick="failLevel()" style="background: #d11;">No, Blurry</button>
            </div>
            <button id="reset-btn" style="display:none; background:#333;" onclick="location.reload()">Restart</button>
        </div>
        
        <button id="start-btn" style="display:none;" onclick="startTest()">Start Vision Test</button>
        
        <button id="scan-btn" class="scan-btn" onclick="performEyeAnalysis()">Analyze Eye Surface</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs" type="module"></script>
    <script src="app.js" type="module"></script>
</body>
</html>
