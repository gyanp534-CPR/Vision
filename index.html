<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision Check Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #121212; color: white; margin: 0; }
        #app-container { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #video-container { position: relative; width: 320px; height: 240px; border-radius: 15px; overflow: hidden; border: 2px solid #333; }
        video { transform: scaleX(-1); width: 100%; height: 100%; object-fit: cover; }
        #status { margin-top: 10px; font-weight: bold; }
        
        /* Snellen Chart Styles */
        #chart-container { margin-top: 30px; background: white; color: black; padding: 20px; border-radius: 10px; min-width: 280px; display: none; }
        .snellen-letter { font-family: serif; font-weight: bold; line-height: 1; display: block; }
        button { background: #0078d4; color: white; border: none; padding: 12px 24px; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="app-container">
        <h1>Vision Screening</h1>
        <div id="video-container">
            <video id="webcam" autoplay playsinline></video>
        </div>
        <div id="status">Initializing AI...</div>

        <div id="chart-container">
            <div id="snellen-letter" class="snellen-letter">E</div>
            <p style="color: #666; font-size: 12px;">Can you see this letter clearly?</p>
            <button onclick="nextLevel()">Yes, Next Level</button>
            <button onclick="failLevel()" style="background: #d11;">No, Too Blurry</button>
        </div>
        
        <button id="start-btn" style="display:none;" onclick="startTest()">Start Vision Test</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs" type="module"></script>
    <script src="app.js" type="module"></script>
</body>
</html>
