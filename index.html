<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gyanam Vision Pro AI</title>
    
        <link rel="stylesheet" href="style.css">

</head>
<body>

    <div id="dashboard">
        <div id="status-bar">
            <div id="mode-text" style="font-size:11px; color:var(--primary); font-weight:bold; letter-spacing: 1px;">SYSTEM READY</div>
            <div id="dist-msg" style="font-size: 15px; margin-top: 5px;">Choose a test mode to begin.</div>
        </div>

        <div id="video-container">
            <video id="webcam" autoplay playsinline></video>
        </div>
            <button onclick="toggleLowLight()" id="lowlight-btn" style="background: #4b5563;">🌙 Night Mode: OFF</button>

        <div id="controls">
            <button onclick="startReadingTest()">📖 Reading Test</button>
            <button onclick="setMode('scan')" class="btn-scan">📸 Retina Scan</button>
        </div>

        <div id="report-overlay">
            <h3 style="margin:0; color:var(--primary);">Final Report</h3>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
            <p><strong>Acuity:</strong> <span id="r-vision">--</span></p>
            <p><strong>Scan:</strong> <span id="r-surface">--</span></p>
            <button onclick="location.reload()" style="width:100%; background:#334155; color:white; padding:12px; border:none; border-radius:10px; margin-top:10px;">New Session</button>
        </div>

        <div id="history-list">
            <h4 style="color:var(--primary); margin-bottom: 10px;">Recent Activity</h4>
            <div id="hist-items"></div>
        </div>
    </div>

    <div id="test-room">
        <div id="mini-cam-container">
            <video id="mini-video" autoplay playsinline></video>
        </div>
        
        <div id="room-header" style="text-align:center;">
            <p id="room-dist-msg" style="color: #64748b; font-weight: 600;">Aligning...</p>
            <h2 style="margin: 5px 0;">Reading Test</h2>
        </div>

        <div id="sample-box">
            <span id="room-text">Initializing text...</span>
        </div>

        <div class="room-controls">
            <button class="btn-room-pass" onclick="passReading()">I Can Read This Clearly</button>
            <button class="btn-room-fail" onclick="failReading()">Too Blurry</button>
        </div>
<div id="color-room">
    <h3 style="margin:0; color:#0ea5e9;">Color Vision Test</h3>
    <p style="font-size:14px; color:#64748b;">What number do you see in the circle?</p>
    
    <div id="plate-container">
        <img id="plate-img" src="https://upload.wikimedia.org/wikipedia/commons/e/e0/Ishihara_9.png" alt="Color Plate">
    </div>

    <div class="keypad">
        <button class="key-btn" onclick="checkColor(7)">7</button>
        <button class="key-btn" onclick="checkColor(9)">9</button>
        <button class="key-btn" onclick="checkColor(12)">12</button>
        <button class="key-btn" onclick="checkColor(8)">8</button>
        <button class="key-btn" onclick="checkColor(5)">5</button>
        <button class="key-btn" onclick="checkColor(0)">None</button>
    </div>
    
    <button onclick="closeColorRoom()" style="margin-top:20px; background:#64748b; width:100%; max-width:300px;">Exit Test</button>
</div>


    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs" type="module"></script>
    <script src="app.js" type="module"></script>
</body>
</html>
